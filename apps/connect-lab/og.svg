<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Metadata -->
  <title>ConnectLab OG Image</title>
  <desc>Visual Sandbox for WalletConnect Testing</desc>

  <!-- Background -->
  <rect width="1200" height="630" fill="#02040a" />

  <!-- Definitions for Gradients and Patterns -->
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1" />
    </pattern>

    <!-- Atmospheric Glows -->
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(200 150) rotate(90) scale(400)">
      <stop stop-color="#2563eb" stop-opacity="0.15" />
      <stop offset="1" stop-color="#2563eb" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowEmerald" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1000 500) rotate(90) scale(400)">
      <stop stop-color="#10b981" stop-opacity="0.1" />
      <stop offset="1" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>

    <!-- Icon Glow -->
    <filter id="iconBlur" x="-20" y="-20" width="100" height="100">
      <feGaussianBlur stdDeviation="15" result="blur" />
    </filter>
  </defs>

  <!-- Apply Grid -->
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Apply Background Glows -->
  <rect width="1200" height="630" fill="url(#glowBlue)" />
  <rect width="1200" height="630" fill="url(#glowEmerald)" />

  <!-- Left Content Group -->
  <g transform="translate(80, 180)">
    <!-- Brand Icon -->
    <rect width="80" height="80" rx="24" fill="#2563eb" />
    <path d="M47 22L27 46H45L43 62L63 38H45L47 22Z" fill="white" />

    <!-- ConnectLab Text -->
    <text x="110" y="65" font-family="sans-serif" font-weight="800" font-size="92" fill="white">
      Connect<tspan fill="#3b82f6">Lab</tspan>
    </text>

    <!-- Description Text -->
    <text x="0" y="160" font-family="sans-serif" font-weight="500" font-size="32" fill="#94a3b8">
      The Premier Visual Sandbox for
    </text>
    <text x="0" y="205" font-family="sans-serif" font-weight="700" font-size="32" fill="white">
      WalletConnect <tspan fill="#94a3b8" font-weight="500">Testing &amp; Debugging.</tspan>
    </text>

    <!-- Multi-Chain Badge -->
    <g transform="translate(0, 260)">
      <rect width="280" height="48" rx="24" fill="white" fill-opacity="0.05" stroke="white"
        stroke-opacity="0.1" />
      <circle cx="24" cy="24" r="4" fill="#10b981" />
      <text x="42" y="29" font-family="monospace" font-weight="700" font-size="14" fill="#cbd5e1"
        letter-spacing="2">
        MULTI-CHAIN WORKSPACE
      </text>
    </g>
  </g>

  <!-- Right Decorative Element (Mock UI) -->
  <g transform="translate(850, 315) rotate(2) scale(1.1)">
    <!-- UI Container -->
    <rect x="-190" y="-225" width="380" height="450" rx="40" fill="#0d1117" fill-opacity="0.9"
      stroke="white" stroke-opacity="0.1" />

    <!-- Window Controls -->
    <circle cx="-140" cy="-185" r="6" fill="#ef4444" fill-opacity="0.5" />
    <circle cx="-120" cy="-185" r="6" fill="#f59e0b" fill-opacity="0.5" />
    <circle cx="-100" cy="-185" r="6" fill="#10b981" fill-opacity="0.5" />

    <!-- Code Snippet Representation -->
    <g transform="translate(-140, -120)">
      <text font-family="monospace" font-size="16" fill="#10b981">{</text>
      <text x="20" y="30" font-family="monospace" font-size="16" fill="#60a5fa">"method": <tspan
          fill="#cbd5e1">"eth_call"</tspan>,</text>
      <text x="20" y="60" font-family="monospace" font-size="16" fill="#60a5fa">"params": <tspan
          fill="#f59e0b">[</tspan></text>
      <text x="40" y="90" font-family="monospace" font-size="16" fill="#60a5fa">{</text>
      <text x="60" y="120" font-family="monospace" font-size="16" fill="#60a5fa">"to": <tspan
          fill="#cbd5e1">"0x71C...897"</tspan></text>
      <text x="40" y="150" font-family="monospace" font-size="16" fill="#60a5fa">}</text>
      <text x="20" y="180" font-family="monospace" font-size="16" fill="#f59e0b">]</text>
      <text x="0" y="210" font-family="monospace" font-size="16" fill="#10b981">}</text>
    </g>

    <!-- UI Shine Overlay -->
    <rect x="-190" y="-225" width="380" height="450" rx="40" fill="url(#uiGradient)"
      fill-opacity="0.1" />
    <defs>
      <linearGradient id="uiGradient" x1="-190" y1="-225" x2="190" y2="225"
        gradientUnits="userSpaceOnUse">
        <stop stop-color="white" />
        <stop offset="1" stop-color="white" stop-opacity="0" />
      </linearGradient>
    </defs>
  </g>
</svg>
