name: Deploy Connect Lab to GitHub Pages

on: workflow_dispatch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Git config user
        uses: snow-actions/git-config-user@v1.0.0
        with:
          name: github-actions
          email: github-actions@github.com

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Verify Change Logs
        run: node common/scripts/install-run-rush.js change --verify

      - name: Rush Install
        run: node common/scripts/install-run-rush.js install

      - name: Rush rebuild
        run: node common/scripts/install-run-rush.js rebuild --verbose

      - name: Install Connect Lab dependencies
        working-directory: apps/connect-lab
        run: pnpm install

      - name: Build Connect Lab for GitHub Pages
        working-directory: apps/connect-lab
        run: pnpm run build
        env:
          VITE_PROJECT_ID: ${{ secrets.VITE_PROJECT_ID }}

      - name: Copy 404.html for GitHub Pages SPA routing
        run: cp apps/connect-lab/dist/index.html apps/connect-lab/dist/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/connect-lab/dist

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

